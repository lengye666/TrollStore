name: Build TrollStore

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # 安装基本依赖
    - name: Install dependencies
      run: |
        brew install ldid make openssl@3 pkg-config
        
    # 设置 Theos 开发环境
    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git theos
        curl -LO https://github.com/theos/sdks/archive/master.zip
        unzip master.zip
        mkdir -p theos/sdks
        mv sdks-master/* theos/sdks/
        rm -rf sdks-master master.zip
        
    # 设置环境变量
    - name: Set environment variables
      run: |
        echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
        echo "PATH=$GITHUB_WORKSPACE/theos/bin:$PATH" >> $GITHUB_ENV
        echo "THEOS_DEVICE_IP=127.0.0.1" >> $GITHUB_ENV
        echo "THEOS_PLATFORM=ios" >> $GITHUB_ENV
        echo "SDKVERSION=16.5" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=/opt/homebrew/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
        echo "CFLAGS=-I/opt/homebrew/include -I$GITHUB_WORKSPACE/theos/include -Os -flto" >> $GITHUB_ENV
        echo "LDFLAGS=-L/opt/homebrew/lib -L$GITHUB_WORKSPACE/theos/lib -flto -dead_strip" >> $GITHUB_ENV
        
    # 构建 TrollStore
    - name: Build TrollStore
      run: |
        cd TrollStore
        make clean
        SDKVERSION=16.5 make package FINALPACKAGE=1 STRIP=1 DEBUG=0
        cd ..
        
    # 构建 TrollHelper
    - name: Build TrollHelper
      run: |
        cd TrollHelper
        make clean
        SDKVERSION=16.5 make package FINALPACKAGE=1 STRIP=1 DEBUG=0
        cd ..
        
    # 构建 PersistenceHelper_Embedded 系列
    - name: Build PersistenceHelper_Embedded
      run: |
        mkdir -p _build
        cd TrollHelper
        
        # 构建标准版本
        echo "构建标准版本..."
        make clean
        SDKVERSION=16.5 make package FINALPACKAGE=1 EMBEDDED_ROOT_HELPER=1 STRIP=1
        cp .theos/obj/TrollStorePersistenceHelper.app/TrollStorePersistenceHelper ../_build/PersistenceHelper_Embedded
        
        # 构建 Legacy arm64 版本
        echo "构建 Legacy arm64 版本..."
        make clean
        SDKVERSION=16.5 make package FINALPACKAGE=1 EMBEDDED_ROOT_HELPER=1 LEGACY_CT_BUG=1 STRIP=1
        cp .theos/obj/TrollStorePersistenceHelper.app/TrollStorePersistenceHelper ../_build/PersistenceHelper_Embedded_Legacy_arm64
        
        # 构建 Legacy arm64e 版本
        echo "构建 Legacy arm64e 版本..."
        make clean
        SDKVERSION=16.5 make package FINALPACKAGE=1 EMBEDDED_ROOT_HELPER=1 CUSTOM_ARCHS=arm64e STRIP=1
        cp .theos/obj/TrollStorePersistenceHelper.app/TrollStorePersistenceHelper ../_build/PersistenceHelper_Embedded_Legacy_arm64e
        cd ..
        
        # 设置权限并打包
        cd _build
        chmod +x PersistenceHelper_Embedded*
        for file in PersistenceHelper_Embedded*; do
          tar -czf "${file}.tar" "$file"
        done
        cd ..
        
    # 创建最终发布包
    - name: Create release package
      run: |
        # 创建临时目录
        mkdir -p release/Applications
        
        # 解压 TrollStore
        cd TrollStore/packages
        dpkg-deb -x *.deb ../../release/
        cd ../..
        
        # 解压 TrollHelper
        cd TrollHelper/packages
        dpkg-deb -x *.deb ../../release/
        cd ../..
        
        # 复制 PersistenceHelper_Embedded 文件
        cp _build/PersistenceHelper_Embedded* release/
        
        # 创建最终的 tar 包
        cd release
        tar -czf ../TrollStore.tar *
        cd ..
        
    # 上传构建产物
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TrollStore
        path: |
          TrollStore.tar
          _build/PersistenceHelper_Embedded*.tar
