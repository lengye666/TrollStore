# TrollStore 构建工作流配置

name: Build TrollStore

# 触发条件：推送到 main 分支或创建 PR 到 main 分支时
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # 使用 macOS 最新版本作为构建环境
    runs-on: macos-latest
    
    steps:
    # 检出代码
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    # 安装依赖工具
    - name: Setup Dependencies
      run: |
        brew install ldid make dpkg xz libarchive openssl pkg-config
        
    # 设置 ChOma 签名工具
    - name: Setup ChOma
      run: |
        git clone https://github.com/opa334/ChOma.git
        cd ChOma/src
        # 修复文件名大小写问题
        find . -type f -name "*.h" -o -name "*.c" -o -name "*.m" | xargs sed -i.bak 's/"Fat\.h"/"FAT.h"/g'
        sed -i.bak 's/struct fat_header/struct FAT_header/g' FAT.h
        sed -i.bak 's/typedef struct fat_header FAT_header/typedef struct FAT_header FAT_header/g' FAT.h
        sed -i.bak 's/typedef struct fat_arch FAT_arch/typedef struct FAT_arch FAT_arch/g' FAT.h
        mv Fat.h FAT.h
        cd ../..
        
    # 构建 fastPathSign 签名工具
    - name: Build fastPathSign
      run: |
        cd Exploits/fastPathSign
        cp ../../ChOma/src/*.h src/
        # 修复文件引用和函数调用
        find . -type f -name "*.h" -o -name "*.c" -o -name "*.m" | xargs sed -i.bak 's/"Fat\.h"/"FAT.h"/g'
        sed -i.bak 's/FAT \*fat/struct FAT \*fat/g' src/main.m
        sed -i.bak 's/update_load_commands_for_coretrust_bypass(macho, encodedSuperblobUnsigned, originalCodeSignatureSize, memory_stream_get_size(macho->stream))/update_load_commands_for_coretrust_bypass(macho, encodedSuperblobUnsigned, originalCodeSignatureSize)/' src/coretrust_bug.c
        make
        chmod +x fastPathSign
        cd ../..
        
    # 设置 Theos 开发环境
    - name: Setup Theos
      run: |
        # 设置 Theos 环境变量
        export THEOS=${{ github.workspace }}/theos
        
        # 克隆 Theos 框架
        git clone --recursive https://github.com/theos/theos.git $THEOS
        
        # 安装 iOS SDK
        mkdir -p $THEOS/sdks
        curl -LO https://github.com/theos/sdks/archive/master.zip
        unzip master.zip -d $THEOS/sdks
        mv $THEOS/sdks/sdks-master/*.sdk $THEOS/sdks/
        rm -rf master.zip $THEOS/sdks/sdks-master
        
        # 设置环境变量
        echo "THEOS=$THEOS" >> $GITHUB_ENV
        echo "PATH=$PATH" >> $GITHUB_ENV
        
    # 设置编译环境和优化选项
    - name: Set up build environment
      run: |
        # 基础环境变量
        echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
        echo "PATH=$PATH:$GITHUB_WORKSPACE/theos/bin:/opt/homebrew/bin" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=/opt/homebrew/lib/pkgconfig:" >> $GITHUB_ENV
        
        # 添加优化选项
        echo "CFLAGS=-I/opt/homebrew/include -I$GITHUB_WORKSPACE/theos/include -I$GITHUB_WORKSPACE/ChOma/include -Os -flto -w" >> $GITHUB_ENV
        echo "LDFLAGS=-L/opt/homebrew/lib -L$GITHUB_WORKSPACE/theos/lib -flto -dead_strip" >> $GITHUB_ENV
        
    # 构建 TrollStore
    - name: Build TrollStore
      run: |
        cd TrollStore
        make clean
        make package DEBUG=0 FINALPACKAGE=1 STRIP=1
        cd ..
        
    # 构建 TrollHelper
    - name: Build TrollHelper
      run: |
        cd TrollHelper
        # 构建标准版本
        make clean
        make package DEBUG=0 FINALPACKAGE=1 STRIP=1
        
        # 构建 rootless 版本
        make clean
        make package DEBUG=0 THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 STRIP=1
        cd ..
        
    # 构建 PersistenceHelper_Embedded 系列
    - name: Build PersistenceHelper_Embedded
      run: |
        mkdir -p _build
        cd TrollHelper
        
        # 构建标准版本
        make clean
        make DEBUG=0 FINALPACKAGE=1 EMBEDDED_ROOT_HELPER=1 STRIP=1
        cp .theos/obj/TrollStorePersistenceHelper.app/TrollStorePersistenceHelper ../_build/PersistenceHelper_Embedded
        
        # 构建 Legacy arm64 版本
        make clean
        make DEBUG=0 FINALPACKAGE=1 EMBEDDED_ROOT_HELPER=1 LEGACY_CT_BUG=1 STRIP=1
        cp .theos/obj/TrollStorePersistenceHelper.app/TrollStorePersistenceHelper ../_build/PersistenceHelper_Embedded_Legacy_arm64
        
        # 构建 Legacy arm64e 版本
        make clean
        make DEBUG=0 FINALPACKAGE=1 EMBEDDED_ROOT_HELPER=1 CUSTOM_ARCHS=arm64e STRIP=1
        cp .theos/obj/TrollStorePersistenceHelper.app/TrollStorePersistenceHelper ../_build/PersistenceHelper_Embedded_Legacy_arm64e
        cd ..
        
    # 创建最终安装包
    - name: Create Packages
      run: |
        # 创建目录
        mkdir -p package/TrollStore.app
        mkdir -p package/TrollHelper.app
        
        # 复制并优化文件
        for dir in TrollStore/.theos/obj/debug TrollHelper/.theos/obj/arm64/debug TrollHelper/.theos/obj/arm64e/debug TrollHelper/.theos/obj/debug; do
          if [ -d "$dir" ]; then
            # 仅复制必要文件，跳过调试信息
            find "$dir" -type f ! -name "*.dSYM" ! -name "*.plist" -exec cp {} package/TrollStore.app/ \;
          fi
        done
        
        # 使用高压缩率打包
        cd package
        tar czf TrollStore.tar --owner=0 --group=0 --mode='a+rx' TrollStore.app
        cd ..
        
        # 打包 PersistenceHelper_Embedded 文件
        if [ -d "_build" ] && [ "$(ls -A _build/PersistenceHelper_Embedded* 2>/dev/null)" ]; then
          cd _build
          # 使用高压缩率打包
          tar czf PersistenceHelper_Embedded.tar --owner=0 --group=0 --mode='a+rx' PersistenceHelper_Embedded*
          cd ..
        fi
        
    # 上传 TrollStore 构建产物
    - name: Upload TrollStore Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollStore
        path: package/TrollStore.tar
        retention-days: 999
        
    # 上传 TrollHelper 构建产物
    - name: Upload TrollHelper Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollHelper
        path: package/TrollHelper.tar
        retention-days: 999
        
    # 上传 PersistenceHelper_Embedded 构建产物
    - name: Upload PersistenceHelper_Embedded Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PersistenceHelper_Embedded
        path: _build/PersistenceHelper_Embedded.tar
        retention-days: 999
