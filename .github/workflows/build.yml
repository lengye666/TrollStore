name: Build TrollStore

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Dependencies
      run: |
        brew install ldid make dpkg xz libarchive openssl pkg-config
        
    - name: Create Header Files
      run: |
        cat > Exploits/fastPathSign/src/FAT.h << 'EOL'
        #ifndef FAT_H
        #define FAT_H
        
        #include <stdint.h>
        
        #define FAT_MAGIC 0xcafebabe
        #define FAT_CIGAM 0xbebafeca
        #define FAT_MAGIC_64 0xcafebabf
        #define FAT_CIGAM_64 0xbfbafeca
        
        struct fat_header {
            uint32_t magic;
            uint32_t nfat_arch;
        };
        
        struct fat_arch {
            uint32_t cputype;
            uint32_t cpusubtype;
            uint32_t offset;
            uint32_t size;
            uint32_t align;
        };
        
        struct fat_arch_64 {
            uint32_t cputype;
            uint32_t cpusubtype;
            uint64_t offset;
            uint64_t size;
            uint32_t align;
            uint32_t reserved;
        };
        
        #endif /* FAT_H */
        EOL
        
        cat > Exploits/fastPathSign/src/CSBlob.h << 'EOL'
        #ifndef CSBLOB_H
        #define CSBLOB_H
        
        #include <stdint.h>
        
        typedef uint32_t CS_HashType;
        typedef uint32_t CS_SuperBlob;
        
        #define CSMAGIC_REQUIREMENT            0xfade0c00
        #define CSMAGIC_REQUIREMENTS          0xfade0c01
        #define CSMAGIC_CODEDIRECTORY         0xfade0c02
        #define CSMAGIC_EMBEDDED_SIGNATURE    0xfade0cc0
        #define CSMAGIC_DETACHED_SIGNATURE    0xfade0cc1
        #define CSMAGIC_BLOBWRAPPER          0xfade0b01
        
        typedef struct {
            uint32_t magic;
            uint32_t length;
        } CS_BlobHeader;
        
        typedef struct {
            uint32_t magic;
            uint32_t length;
            uint32_t count;
            char index[];
        } CS_SuperBlob_t;
        
        typedef struct {
            uint32_t type;
            uint32_t offset;
        } CS_BlobIndex;
        
        #endif /* CSBLOB_H */
        EOL
        
    - name: Setup ChOma Headers
      run: |
        cd ChOma
        ls -la
        pwd
        mkdir -p include
        find . -name "*.h" -type f -exec cp {} include/ \;
        cd ..
        
    - name: Build fastPathSign
      run: |
        cd Exploits/fastPathSign
        cp ../../ChOma/src/*.h src/
        # 修复文件引用和函数调用
        find . -type f -name "*.h" -o -name "*.c" -o -name "*.m" | xargs sed -i.bak 's/"Fat\.h"/"FAT.h"/g'
        sed -i.bak 's/FAT \*fat/struct FAT \*fat/g' src/main.m
        sed -i.bak 's/update_load_commands_for_coretrust_bypass(macho, encodedSuperblobUnsigned, originalCodeSignatureSize, memory_stream_get_size(macho->stream))/update_load_commands_for_coretrust_bypass(macho, encodedSuperblobUnsigned, originalCodeSignatureSize)/' src/coretrust_bug.c
        make
        chmod +x fastPathSign
        cd ../..
        
    - name: Setup Theos
      run: |
        export THEOS=${{ github.workspace }}/theos
        mkdir -p $THEOS/sdks
        curl -LO https://github.com/theos/sdks/archive/master.zip
        unzip master.zip -d $THEOS/sdks
        mv $THEOS/sdks/sdks-master/*.sdk $THEOS/sdks/
        rm -rf master.zip $THEOS/sdks/sdks-master
        curl -LO https://github.com/theos/lib/archive/master.zip
        unzip master.zip
        cp -R lib-master/* ./
        rm -rf master.zip lib-master
        
    - name: Setup Build Environment
      run: |
        export THEOS=${{ github.workspace }}/theos
        export PATH="/opt/homebrew/bin:$PATH"
        export PKG_CONFIG_PATH="/opt/homebrew/lib/pkgconfig:$PKG_CONFIG_PATH"
        export CFLAGS="-I/opt/homebrew/include -I$THEOS/include -I${{ github.workspace }}/ChOma/include -Wno-error=unused-variable"
        export LDFLAGS="-L/opt/homebrew/lib -L$THEOS/lib"
        echo "THEOS=$THEOS" >> $GITHUB_ENV
        echo "PATH=$PATH" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $GITHUB_ENV
        echo "CFLAGS=$CFLAGS" >> $GITHUB_ENV
        echo "LDFLAGS=$LDFLAGS" >> $GITHUB_ENV
        
    - name: Build TrollStore
      run: |
        cd TrollStore
        make package THEOS_PACKAGE_SCHEME=rootless  
        
    - name: Build TrollHelper
      run: |
        cd TrollHelper
        make package THEOS_PACKAGE_SCHEME=rootless
        
    - name: Build PersistenceHelper
      run: |
        cd PersistenceHelper
        make package THEOS_PACKAGE_SCHEME=rootless
        
    - name: Create TrollStore Package
      run: |
        mkdir -p package/TrollStore.app
        cp -r TrollStore/.theos/obj/debug/* package/TrollStore.app/
        cp -r TrollHelper/.theos/obj/debug/* package/TrollStore.app/
        cp -r PersistenceHelper/.theos/obj/debug/* package/TrollStore.app/
        cd package
        tar -czf TrollStore.tar TrollStore.app
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollStore
        path: package/TrollStore.tar
        retention-days: 999
